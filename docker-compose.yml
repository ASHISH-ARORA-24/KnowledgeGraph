services:

  neo4j:
    image: neo4j:community
    container_name: neo4j-kg
    ports:
      - "7474:7474"   # Neo4j Browser (web UI)
      - "7687:7687"   # Bolt protocol (Python driver connects here)
    environment:
      NEO4J_AUTH: neo4j/password123
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
